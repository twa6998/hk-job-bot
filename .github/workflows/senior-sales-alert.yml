name: Senior Sales Daily Report

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  senior-sales-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Selenium + Chrome 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install requests beautifulsoup4 python-telegram-bot selenium webdriver-manager

      - name: 🚀 Senior Sales Job Alert 실행
        run: python job_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
