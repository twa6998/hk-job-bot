name: Senior Sales Daily Report

on:
  schedule:
    - cron: '0 2 * * *'      # 매일 한국시간 오전 11시
  workflow_dispatch:

jobs:
  senior-sales-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repository 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 필요한 패키지 설치
        run: |
          pip install requests beautifulsoup4 python-telegram-bot

      - name: 🚀 Senior Sales Job Alert 실행
        run: python job_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
