name: VWAP Signal Bot

on:
  schedule:
    - cron: '5 2 * * *'   # 매일 HK 시간 오전 10:05
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot requests

      - name: Run VWAP Signal Bot
        env:
          BOT_TOKEN_VWAP: ${{ secrets.BOT_TOKEN_VWAP }}
          CHAT_ID_VWAP: ${{ secrets.CHAT_ID_VWAP }}
        run: |
          echo "🚀 VWAP Signal Bot 시작"
          python vwap_signalbot.py
          echo "✅ VWAP Signal Bot 실행 완료 (exit code: $?)"
